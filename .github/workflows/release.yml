name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            tags: webkit2_41
            app_binary: OdoBox
            app_asset: OdoBox
            cli_binary: odobox-cli
            cli_asset: odobox-cli
            ocr_binary: odobox-ocr
            ocr_asset: odobox-ocr
            package_name: odobox-linux-amd64.tar.gz
            package_dir: odobox-linux-amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            tags: ""
            app_binary: OdoBox.exe
            app_asset: OdoBox.exe
            cli_binary: odobox-cli.exe
            cli_asset: odobox-cli.exe
            ocr_binary: odobox-ocr.exe
            ocr_asset: odobox-ocr.exe
            package_name: odobox-windows-amd64.zip
            package_dir: odobox-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Install make on Windows
        if: matrix.goos == 'windows'
        run: choco install make -y

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare CI config.ini
        shell: bash
        run: |
          if [ ! -f config.ini ]; then
            cp config.ini.example config.ini
          fi

      - name: Build release via Makefile
        shell: bash
        run: |
          make release-ci RELEASE_OS=${{ matrix.goos }} RELEASE_ARCH=${{ matrix.goarch }} TAGS="${{ matrix.tags }}"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p artifacts "${{ matrix.package_dir }}"
          cp "build/bin/${{ matrix.app_binary }}" "${{ matrix.package_dir }}/${{ matrix.app_asset }}"
          cli_src="build/bin/${{ matrix.cli_binary }}"
          ocr_src="build/bin/${{ matrix.ocr_binary }}"
          if [ ! -f "$cli_src" ] && [ -f "${cli_src%.exe}" ]; then
            cli_src="${cli_src%.exe}"
          fi
          if [ ! -f "$ocr_src" ] && [ -f "${ocr_src%.exe}" ]; then
            ocr_src="${ocr_src%.exe}"
          fi
          cp "$cli_src" "${{ matrix.package_dir }}/${{ matrix.cli_asset }}"
          cp "$ocr_src" "${{ matrix.package_dir }}/${{ matrix.ocr_asset }}"
          cp "config.ini.example" "${{ matrix.package_dir }}/config.ini.example"

      - name: Create Linux release package
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/${{ matrix.package_name }}" "${{ matrix.package_dir }}"

      - name: Create Windows release package
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "artifacts/${{ matrix.package_name }}") { Remove-Item "artifacts/${{ matrix.package_name }}" -Force }
          Compress-Archive -Path "${{ matrix.package_dir }}/*" -DestinationPath "artifacts/${{ matrix.package_name }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/${{ matrix.package_name }}
