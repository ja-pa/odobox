name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            tags: webkit2_41
            app_binary: OdoBox
            app_asset: odobox-linux-amd64
            cli_binary: odobox-cli
            cli_asset: odobox-cli-linux-amd64
            ocr_binary: odobox-ocr
            ocr_asset: odobox-ocr-linux-amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            tags: ""
            app_binary: OdoBox.exe
            app_asset: odobox-windows-amd64.exe
            cli_binary: odobox-cli.exe
            cli_asset: odobox-cli-windows-amd64.exe
            ocr_binary: odobox-ocr.exe
            ocr_asset: odobox-ocr-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Install make on Windows
        if: matrix.goos == 'windows'
        run: choco install make -y

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare CI config.ini
        shell: bash
        run: |
          if [ ! -f config.ini ]; then
            cp config.ini.example config.ini
          fi

      - name: Build release via Makefile
        shell: bash
        run: |
          make release-ci RELEASE_OS=${{ matrix.goos }} RELEASE_ARCH=${{ matrix.goarch }} TAGS="${{ matrix.tags }}"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p artifacts
          cp "build/bin/${{ matrix.app_binary }}" "artifacts/${{ matrix.app_asset }}"
          cp "build/bin/${{ matrix.cli_binary }}" "artifacts/${{ matrix.cli_asset }}"
          cp "build/bin/${{ matrix.ocr_binary }}" "artifacts/${{ matrix.ocr_asset }}"
          cp "build/bin/config.ini.example" "artifacts/config.ini.example"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
